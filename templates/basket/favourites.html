{% extends 'base.html' %}
{% load static %}

{% block title %}Избранное • CityPark{% endblock %}

{% block content %}

<style>
.favorites-section {
    width: min(1300px, 94%);
    margin: 0 auto;
    padding: 80px 0;
}

.favorites-title {
    text-align: center;
    font-family: "Playfair Display", serif;
    font-size: clamp(36px, 5vw, 56px);
    color: var(--gold);
    margin-bottom: 15px;
}

.favorites-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 17px;
    margin-bottom: 50px;
}

.favorites-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
}

.favorite-card {
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
    border-radius: 24px;
    overflow: hidden;
    transition: 0.35s;
    box-shadow: var(--shadow-soft);
}

.favorite-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-gold);
}

.favorite-card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
}

.favorite-content {
    padding: 24px;
}

.favorite-content h3 {
    color: var(--text-primary);
    font-size: 24px;
    margin-bottom: 10px;
}

.favorite-content p {
    color: var(--text-secondary);
    margin-bottom: 20px;
}

.favorite-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.favorite-price {
    color: var(--gold);
    font-size: 24px;
    font-weight: 700;
}

.favorite-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.btn-small {
    flex: 1;
    padding: 13px 18px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: .3s;
}

.btn-cart {
    background: var(--gradient-gold);
    color: #0a0a0a;
    box-shadow: var(--shadow-gold);
}

.btn-cart:hover {
    transform: translateY(-2px);
}

.btn-remove {
    background: transparent;
    color: #ff7b7b;
    border: 1px solid rgba(255, 80, 80, .3);
}

.btn-remove:hover {
    background: rgba(255, 80, 80, .1);
}

.empty-favorites {
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
    border-radius: 24px;
    padding: 70px 20px;
    text-align: center;
    color: var(--text-secondary);
    box-shadow: var(--shadow-soft);
}

.empty-favorites h2 {
    font-family: "Playfair Display", serif;
    color: var(--gold);
    margin-bottom: 15px;
    font-size: 34px;
}

.center-button {
    text-align: center;
    margin-top: 45px;
}

.center-button a {
    display: inline-block;
    padding: 16px 32px;
    border-radius: 999px;
    background: var(--gradient-gold);
    color: #0a0a0a;
    font-weight: 600;
    box-shadow: var(--shadow-gold);
    transition: .3s;
}

.center-button a:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 50px rgba(212,175,55,.25);
}

@media (max-width: 768px) {

    .favorites-grid {
        grid-template-columns: 1fr;
    }

    .favorite-actions {
        flex-direction: column;
    }

    .btn-small {
        width: 100%;
    }
}
</style>

<section class="favorites-section">

    <h1 class="favorites-title">
        Избранное
    </h1>

    <p class="favorites-subtitle">
        Ваши любимые блюда
    </p>

    <div id="favorite-items" class="favorites-grid"></div>

    <div id="empty-fav-message" class="empty-favorites">
        <h2>🤍 Пока ничего нет</h2>
        <p>Добавьте понравившиеся блюда в избранное.</p>
    </div>

    <div class="center-button">
        <a href="{% url 'index' %}#menu">
            Посмотреть меню
        </a>
    </div>

</section>

{% endblock %}

{% block scripts %}

<script>
function loadFavorites() {

    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    const container = document.getElementById('favorite-items');
    const emptyMessage = document.getElementById('empty-fav-message');

    if (favorites.length === 0) {

        container.innerHTML = '';
        emptyMessage.style.display = 'block';

        return;
    }

    emptyMessage.style.display = 'none';

    container.innerHTML = '';

    for (let i = 0; i < favorites.length; i++) {

        const item = favorites[i];

        const card = document.createElement('div');

        card.innerHTML = `
            <div class="favorite-card">

                <img src="${item.image || 'https://via.placeholder.com/300x200?text=Нет+фото'}"
                     alt="${item.name}">

                <div class="favorite-content">

                    <h3>${item.name}</h3>

                    <p>Вкусное блюдо от шеф-повара</p>

                    <div class="favorite-bottom">

                        <div class="favorite-price">
                            ${item.price} ₽
                        </div>

                    </div>

                    <div class="favorite-actions">

                        <button
                            class="btn-small btn-cart"
                            onclick="addToCartFromFav(${i})">

                            🛒 В корзину

                        </button>

                        <button
                            class="btn-small btn-remove"
                            onclick="removeFromFavorites(${i})">

                            ✕ Удалить

                        </button>

                    </div>

                </div>

            </div>
        `;

        container.appendChild(card);
    }
}

function addToCartFromFav(index) {

    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    let item = favorites[index];

    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    cart.push({
        id: item.id,
        name: item.name,
        price: item.price,
        quantity: 1,
        image: item.image
    });

    localStorage.setItem('cart', JSON.stringify(cart));

    alert("✅ " + item.name + " добавлен в корзину");

    if (window.updateCounters) {
        window.updateCounters();
    }
}

function removeFromFavorites(index) {

    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    let removed = favorites[index];

    favorites.splice(index, 1);

    localStorage.setItem('favorites', JSON.stringify(favorites));

    loadFavorites();

    if (window.updateCounters) {
        window.updateCounters();
    }

    alert("💔 " + removed.name + " удален из избранного");
}

loadFavorites();
</script>

{% endblock %}
