{% extends 'base.html' %}

{% block title %}Авторизация{% endblock %}

{% block content %}

<style>
.auth-section {
    min-height: calc(100vh - 160px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
}

.auth-card {
    width: 100%;
    max-width: 480px;
    background: var(--bg-card);
    border: 1px solid var(--border-gold);
    border-radius: 20px;
    padding: 40px;
    box-shadow: var(--shadow-soft);
}

.auth-title {
    text-align: center;
    font-family: "Playfair Display", serif;
    font-size: 36px;
    color: var(--gold);
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-secondary);
}

input {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #1b1b1b;
    color: #fff;
}

input:focus {
    outline: none;
    border-color: var(--gold);
}

.field-error {
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(231, 76, 60, 0.1);
    border: 1px solid rgba(231, 76, 60, 0.3);
    color: #ff6b6b;
    border-radius: 8px;
    font-size: 13px;
}

.auth-btn {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 999px;
    background: var(--gradient-gold);
    font-weight: 600;
    cursor: pointer;
}

.auth-footer {
    margin-top: 20px;
    text-align: center;
    color: var(--text-secondary);
}

.auth-footer a {
    color: var(--gold);
}
</style>

<section class="auth-section">
    <div class="auth-card">

        <h2 class="auth-title">Авторизация</h2>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}

                    {% if field.errors %}
                        <div class="field-error">
                            {{ field.errors|striptags }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="auth-btn">Войти</button>
        </form>

        <div class="auth-footer">
            Нет аккаунта?
            <a href="{% url 'registration' %}">Регистрация</a>
        </div>

    </div>
</section>

{% endblock %}
