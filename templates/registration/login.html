{% extends 'base.html' %}

{% block title %}Авторизация{% endblock %}

{% block content %}

<style>
    .auth-section {
        min-height: calc(100vh - 180px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 80px 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 520px;
        background: var(--bg-card);
        border: 1px solid var(--border-gold);
        border-radius: 24px;
        padding: 45px;
        box-shadow: var(--shadow-soft);
        transition: 0.3s;
    }

    .auth-card:hover {
        box-shadow: var(--shadow-gold);
    }

    .auth-title {
        text-align: center;
        font-family: "Playfair Display", serif;
        font-size: 42px;
        color: var(--gold);
        margin-bottom: 35px;
    }

    .auth-card form p {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
    }

    .auth-card label {
        margin-bottom: 8px;
        color: var(--gold-light);
        font-size: 14px;
        font-weight: 500;
    }

    .auth-card input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #1b1b1b;
        color: #ffffff;
        font-size: 15px;
        transition: 0.3s;
    }

    .auth-card input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 12px var(--gold-glow);
    }

    .auth-card ul.errorlist {
        list-style: none;
        padding: 0;
        margin-bottom: 10px;
        color: #ff7d7d;
        font-size: 13px;
    }

    .auth-btn {
        width: 100%;
        padding: 15px;
        margin-top: 15px;
        border: none;
        border-radius: 999px;
        background: var(--gradient-gold);
        color: #0a0a0a;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: var(--shadow-gold);
    }

    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 40px rgba(212, 175, 55, 0.25);
    }

    .auth-footer {
        margin-top: 25px;
        text-align: center;
        color: var(--text-secondary);
    }

    .auth-footer a {
        color: var(--gold);
        transition: 0.3s;
    }

    .auth-footer a:hover {
        color: var(--gold-light);
    }
</style>

<section class="auth-section">
    <div class="auth-card">

        <h2 class="auth-title">Авторизация</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="auth-btn">
                Войти
            </button>
        </form>

        <div class="auth-footer">
            Еще не зарегистрированы?
            <a href="{% url 'registration' %}">
                Зарегистрироваться
            </a>
        </div>

    </div>
</section>

{% endblock %}
